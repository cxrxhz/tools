<section id='module-1' class='module'><h2>Module 1 · 问题与动机</h2><p>该工作通过碳点修饰羟基化BN并引入丝素水凝胶，实现导热、体表降温、可降解与皮肤友好性的平衡。</p><div class='grid cards'><article class='card'><h3>研究意义</h3><p>体表散热材料需同时满足导热、贴肤和可持续要求。</p></article><article class='card'><h3>关键瓶颈</h3><p>高导热填料与生物基基体之间通常存在界面失配。</p></article><article class='card'><h3>核心思路</h3><p>以碳点调控BN表面界面，再与丝素甲基丙烯化凝胶耦合。</p></article></div></section>
