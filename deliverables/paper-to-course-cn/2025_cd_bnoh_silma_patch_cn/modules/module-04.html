<section id='module-4' class='module'><h2>Module 4 · 本文方法详解</h2><div class='grid two-col'><div class='card'><h3>方法流程</h3><ol><li><strong>1. 制备碳点</strong> 通过固相热合成得到CQDs。</li><li><strong>2. 构建CDs@BNOH</strong> 在BNOH表面实现碳点修饰。</li><li><strong>3. 制备SilMA</strong> 丝素甲基丙烯化用于光固化网络。</li><li><strong>4. 形成贴片</strong> 复合填料注入凝胶并固化得到可贴附器件。</li></ol></div><div class='card'><h3>核心公式</h3><div class='quote'>适度碳点修饰可延长有效声子输运路径，过度修饰会破坏导热网络完整性。</div><ul><li><strong>fwhm</strong> · 拉曼线宽用于表征声子寿命变化</li><li><strong>D%</strong> · 凝胶降解率</li><li><strong>ΔT</strong> · 相对空白组降温效果</li><li><strong>λ</strong> · 贴片热导率</li></ul></div></div></section>
