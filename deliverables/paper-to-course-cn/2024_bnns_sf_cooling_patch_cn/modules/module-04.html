<section id='module-4' class='module'><h2>Module 4 · 本文方法详解</h2><div class='grid two-col'><div class='card'><h3>方法流程</h3><ol><li><strong>1. 制备BNNS</strong> 由h-BN剥离得到片层填料。</li><li><strong>2. 与丝素复配</strong> 溶液混合后进行过滤成膜。</li><li><strong>3. 形成定向网络</strong> 层状堆叠提升面内导热效率。</li><li><strong>4. 性能验证</strong> 测试导热、光谱、循环稳定与生物安全。</li></ol></div><div class='card'><h3>核心公式</h3><div class='quote'>λ = α × ρ × Cp；导热增强率 TCE = (λ复合 - λ基体) / λ基体 × 100%</div><ul><li><strong>λ</strong> · 等效热导率</li><li><strong>α</strong> · 热扩散率</li><li><strong>ρ</strong> · 密度</li><li><strong>Cp</strong> · 比热容</li></ul></div></div></section>
