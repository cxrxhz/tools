<section id='module-1' class='module'><h2>Module 1 · 问题与动机</h2><p>该工作将BNNS与丝素蛋白耦合构建定向导热网络，在保证可穿戴与生物相容性的同时，实现热扩散与辐射制冷协同。</p><div class='grid cards'><article class='card'><h3>研究意义</h3><p>制冷能耗高，皮肤侧被动散热是低能耗路线。</p></article><article class='card'><h3>关键瓶颈</h3><p>丝素本体相容性好但热输运能力不够。</p></article><article class='card'><h3>核心思路</h3><p>以BNNS构建定向热通道，以丝素提供柔性与可持续基体。</p></article></div></section>
