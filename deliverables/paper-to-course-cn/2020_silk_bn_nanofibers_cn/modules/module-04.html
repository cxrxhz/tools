<section id='module-4' class='module'><h2>Module 4 · 本文方法详解</h2><div class='grid two-col'><div class='card'><h3>方法流程</h3><ol><li><strong>1. 配制丝素纺丝液</strong> 建立稳定的电纺前驱体系。</li><li><strong>2. 引入h-BN</strong> 按比例混合形成复合溶液。</li><li><strong>3. 电纺成纤</strong> 获得不同结构特征的复合纤维膜。</li><li><strong>4. 热与结构表征</strong> 通过SEM/FTIR/TGA/TM-DSC分析机制。</li></ol></div><div class='card'><h3>核心公式</h3><div class='quote'>通过Tw、Tg、Td等特征温度迁移来刻画BN对丝素热行为的调控。</div><ul><li><strong>Tw</strong> · 束缚水相关热事件</li><li><strong>Tg</strong> · 玻璃化转变特征</li><li><strong>Td</strong> · 热降解特征</li><li><strong>纤维直径</strong> · 形貌调控的直接指标</li></ul></div></div></section>
