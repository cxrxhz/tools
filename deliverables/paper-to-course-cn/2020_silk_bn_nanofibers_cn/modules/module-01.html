<section id='module-1' class='module'><h2>Module 1 · 问题与动机</h2><p>该工作表明h-BN可显著调控电纺丝素纤维的形貌、二级结构与热稳定性，为生物基热功能纤维提供可调设计路径。</p><div class='grid cards'><article class='card'><h3>研究意义</h3><p>电纺丝素可构建高比表面积网络，但热稳定性仍有提升空间。</p></article><article class='card'><h3>关键瓶颈</h3><p>填料增强需兼顾纤维可纺性与结构完整性。</p></article><article class='card'><h3>核心思路</h3><p>通过h-BN比例调控实现形貌-结构-热性质联动优化。</p></article></div></section>
