<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>管控系统</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
    .tab { display: none; }
    .tab.active { display: block; }
    nav button { margin-right: 10px; }
    label { display: block; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="mainContainer" style="max-width:900px; margin:0 auto;">
    <h1>管控系统</h1>

    <!-- 顶部导航栏（也放进容器内） -->
    <nav style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
      <div style="display:flex; gap:6px;">
        <button onclick="showTab('calc')">许可页面</button>
        <button onclick="showTab('edit')">编辑事件</button>
        <button id="editTaskBtn" type="button">编辑任务</button>
        <button id="editExtraTaskBtn" type="button">编辑附加任务</button>
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <button id="exportConfigBtn" type="button">导出配置</button>
        <button id="importConfigBtn" type="button">导入配置</button>
        <input id="importConfigFile" type="file" accept="application/json" style="display:none;">
        <button id="modeSwitchBtn" type="button" style="background:#e6e6e6; color:#0078d4; border-radius:5px; padding:4px 12px;">本地模式</button>
      </div>
      <!-- 任务编辑弹窗 -->
        <div id="taskModal" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.18); z-index:1000; align-items:center; justify-content:center;">
          <div style="background:#fff; min-width:420px; max-width:90vw; padding:24px 28px 18px 28px; border-radius:8px; box-shadow:0 2px 16px #0002; position:relative;">
            <h2 style="margin-top:0;">编辑任务</h2>
            <div id="taskEditForm"></div>
            <div style="margin-top:18px; display:flex; gap:12px;">
              <button id="addTaskBtn" type="button">添加任务</button>
              <button id="saveTaskBtn" type="button">保存</button>
              <button id="closeTaskBtn" type="button" style="margin-left:auto;">关闭</button>
            </div>
          </div>
        </div>
        <div id="extraTaskModal" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.18); z-index:1000; align-items:center; justify-content:center;">
          <div style="background:#fff; min-width:420px; max-width:90vw; padding:24px 28px 18px 28px; border-radius:8px; box-shadow:0 2px 16px #0002; position:relative;">
            <h2 style="margin-top:0;">编辑附加任务</h2>
            <div id="extraTaskEditForm"></div>
            <div style="margin-top:18px; display:flex; gap:12px;">
              <button id="addExtraTaskBtn" type="button">添加任务</button>
              <button id="saveExtraTaskBtn" type="button">保存</button>
              <button id="closeExtraTaskBtn" type="button" style="margin-left:auto;">关闭</button>
            </div>
          </div>
        </div>
    </nav>

    <!-- 主区域：左右分栏 -->
    <div id="calc" class="tab active" style="display: flex; align-items: flex-start; min-height:500px;">
      <div style="width:520px; min-width:400px; padding-right:32px;">
      <div style="margin-bottom:10px;">
        <label>选择事件:
          <select id="eventSelect"></select>
        </label>
        <label style="margin-left:20px;">迫切程度:
          <select id="urgeSelect"></select>
        </label>
      </div>
      <div id="ruleBox" style="display:none; margin:0 0 10px 0; padding:10px 12px; border:1px solid #e6e6e6; background:#fafbfc; max-width:700px; white-space:pre-wrap;"></div>
      <div style="margin-bottom:10px;">
        <span>使用附加值：</span>
        <button id="useRewardBtn" style="display:none;">使用</button>
        <input id="useRewardInput" type="number" value="0" style="width:60px;">
        <span id="useRewardInfo" style="margin-left:8px;color:#888;"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="requestBtn">请求许可</button>
        <span id="askCostInfo" style="color:#d2691e;"></span>
        <span id="cooldownTimer" style="display:none;color:#0078d4;"></span>
      </div>
      <div id="reaskRow" style="display:none; margin-top:8px;">
        <button id="reaskBtn" type="button">再次询问</button>
        <span id="reaskCostInfo" style="margin-left:10px; color:#d2691e;"></span>
      </div>
      <div id="result" style="margin-top:10px;"></div>
          <div style="height:2em;"></div>
          <button id="toggleSetStartBtn" style="margin-bottom:8px;">附加功能</button>
          <div id="setStartPanel" style="display:none; border:1px solid #ccc; padding:12px; margin-bottom:10px; background:#fafbfc; max-width:340px;">
            <div style="margin-bottom:8px;">
              <label>开始时间:
                <input id="setStartDate" type="date" style="width:130px;">
                <input id="setStartTime" type="time" step="1" style="width:110px;">
              </label>
            </div>
            <button id="setStartNowBtn" type="button" style="margin-right:10px;">设置为现在</button>
            <button id="setStartApplyBtn" type="button">应用到当前事件</button>
                <button id="setStartUndoBtn" type="button" style="margin-left:10px;">撤销应用</button>
            <span id="setStartInfo" style="color:#888; margin-left:10px;"></span>
          </div>

        <button id="toggleTasksBtn" type="button" style="margin:8px 0;">任务列表</button>
        <div id="tasksPanel" style="border:1px solid #ccc; padding:12px; margin-bottom:10px; background:#fafbfc; max-width:520px;">
          <div id="tasksList"></div>
          <div id="tasksInfo" style="color:#888; margin-top:8px;"></div>
        </div>
        <button id="toggleExtraTasksBtn" type="button" style="margin:8px 0;">附加任务列表</button>
        <div id="extraTasksPanel" style="display:none; border:1px solid #ccc; padding:12px; margin-bottom:10px; background:#fafbfc; max-width:520px;">
          <div id="extraTasksList"></div>
          <div id="extraTasksInfo" style="color:#888; margin-top:8px;"></div>
        </div>
    </div>
      <div style="width:200px; min-width:160px; border-left:1px solid #ccc; padding-left:32px; display:flex; flex-direction:column; gap:24px;">
      <div>
        <h3>附加系统</h3>
        <div style="margin-bottom:10px;">奖励值存量：<span id="rewardStock">0</span></div>
        <div style="margin-bottom:10px;">
          <button id="addRewardBtn">获得</button>
          <input id="addRewardInput" type="number" value="10" style="width:60px;">
        </div>
        <div style="height:18px;"></div>
        <div style="margin-bottom:10px;">
          <button id="forceGrantBtn">我没忍住</button>
        </div>
        <div style="border-top:1px solid #ccc; margin:18px 0 0 0; padding-top:10px;">
          <h4 style="margin:0 0 8px 0;">小工具</h4>
          <div style="margin-bottom:12px;">
            <b>计时器：</b>
            <input id="timerInput" type="number" min="1" value="60" style="width:60px;"> 秒
            <button id="timerStartBtn">开始</button>
            <span id="timerDisplay" style="margin-left:8px;color:#0078d4;"></span>
          </div>
          <div style="margin-bottom:12px;">
            <b>骰子：</b>
            <input id="diceMin" type="number" value="1" style="width:40px;"> -
            <input id="diceMax" type="number" value="6" style="width:40px;">
            <button id="diceBtn">掷骰</button>
            <span id="diceResult" style="margin-left:8px;color:#0078d4;"></span>
          </div>
        </div>
      </div>
      <!-- 编辑事件弹窗 -->
      <div id="eventModal" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.18); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#fff; min-width:420px; max-width:90vw; padding:24px 28px 18px 28px; border-radius:8px; box-shadow:0 2px 16px #0002; position:relative;">
          <h2 style="margin-top:0;">编辑事件配置</h2>
          <label>选择事件:
            <select id="editEventSelect"></select>
          </label>
          <button type="button" onclick="addEvent()">增加事件</button>
          <button type="button" onclick="deleteEvent()">删除事件</button>
          <div id="editForm"></div>
          <div id="urgeMapForm"></div>
          <div style="margin-top:18px; display:flex; gap:12px;">
            <button type="button" onclick="saveEvents()">保存修改</button>
            <button id="closeEventBtn" type="button" style="margin-left:auto;">关闭</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 编辑页（已嵌入右侧内容区，无需单独显示） -->

  <script>
            // 小工具：计时器与骰子
            let timerInterval = null;
            const timerInput = document.getElementById('timerInput');
            const timerStartBtn = document.getElementById('timerStartBtn');
            const timerDisplay = document.getElementById('timerDisplay');
            if (timerStartBtn) {
              timerStartBtn.addEventListener('click', function() {
                if (timerInterval) clearInterval(timerInterval);
                let sec = parseInt(timerInput.value) || 0;
                if (sec <= 0) return;
                timerDisplay.innerText = formatCountdown(sec);
                timerInterval = setInterval(() => {
                  sec--;
                  if (sec <= 0) {
                    timerDisplay.innerText = '时间到!';
                    clearInterval(timerInterval);
                    timerInterval = null;
                  } else {
                    timerDisplay.innerText = formatCountdown(sec);
                  }
                }, 1000);
              });
            }

            const diceMin = document.getElementById('diceMin');
            const diceMax = document.getElementById('diceMax');
            const diceBtn = document.getElementById('diceBtn');
            const diceResult = document.getElementById('diceResult');
            if (diceBtn) {
              diceBtn.addEventListener('click', function() {
                const min = parseInt(diceMin.value) || 1;
                const max = parseInt(diceMax.value) || 6;
                if (min > max) {
                  diceResult.innerText = '区间错误';
                  return;
                }
                const val = Math.floor(Math.random() * (max - min + 1)) + min;
                diceResult.innerText = val;
              });
            }
        // 导出/导入配置
        const exportConfigBtn = document.getElementById('exportConfigBtn');
        const importConfigBtn = document.getElementById('importConfigBtn');
        const importConfigFile = document.getElementById('importConfigFile');

        exportConfigBtn.addEventListener('click', function() {
          const data = {
            events,
            rewardStock,
            tasks: loadTasks(),
            extraTasks: loadExtraTasks(),
          };
          const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'event_app_config_' + new Date().toISOString().replace(/[:T]/g,'-').slice(0,19) + '.json';
          document.body.appendChild(a);
          a.click();
          setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }, 100);
        });

        importConfigBtn.addEventListener('click', function() {
          importConfigFile.value = '';
          importConfigFile.click();
        });

        importConfigFile.addEventListener('change', function(e) {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function(evt) {
            try {
              const data = JSON.parse(evt.target.result);
              // 以导入内容覆盖当前内存，然后统一应用/持久化（本地&可选服务器）
              try { applyConfigSnapshot(data); } catch (e2) {
                alert('导入失败：文件内容不合法');
                return;
              }
              // 若当前为服务器模式，同时推送到服务器
              Promise.resolve(saveConfig && saveConfig()).then(() => {
                alert('配置已导入！');
              }).catch(() => {
                alert('配置已导入（但同步到服务器失败）');
              });
            } catch (e) {
              alert('导入失败：文件格式错误');
            }
          };
          reader.readAsText(file);
        });
    // ========================
    // 任务系统（编辑页/许可页）
    // ========================
    const TASKS_KEY = 'tasks';

    const toggleTasksBtn = document.getElementById('toggleTasksBtn');
    const tasksPanel = document.getElementById('tasksPanel');
    const tasksList = document.getElementById('tasksList');
    const tasksInfo = document.getElementById('tasksInfo');

    function parseCycleToSeconds(text) {
      const s = (text || '').trim();
      if (!s) return 0;
      // 兼容任务周期写法，并扩展支持 `m` 作为分钟（如 2h10m）
      const re = /(\d+)\s*(d|h|m|min|s)/gi;
      let m;
      let total = 0;
      let consumed = '';
      while ((m = re.exec(s)) !== null) {
        const n = parseInt(m[1], 10) || 0;
        const unit = String(m[2] || '').toLowerCase();
        consumed += m[0].replace(/\s+/g, '');
        if (unit === 'd') total += n * 86400;
        else if (unit === 'h') total += n * 3600;
        else if (unit === 'min' || unit === 'm') total += n * 60;
        else if (unit === 's') total += n;
      }
      // 若完全无法匹配任何单位，视为无
      if (total <= 0) return 0;
      return total;
    }

    function formatCycle(seconds) {
      seconds = Math.max(0, Math.floor(seconds || 0));
      if (!seconds) return '';
      const d = Math.floor(seconds / 86400); seconds -= d * 86400;
      const h = Math.floor(seconds / 3600); seconds -= h * 3600;
      const m = Math.floor(seconds / 60); seconds -= m * 60;
      const parts = [];
      if (d) parts.push(d + 'd');
      if (h) parts.push(h + 'h');
      if (m) parts.push(m + 'min');
      if (seconds) parts.push(seconds + 's');
      return parts.join('');
    }

    function todayISODate() {
      return new Date().toISOString().slice(0, 10);
    }

    function loadTasks() {
      try {
        const raw = localStorage.getItem(TASKS_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(arr)) return [];
        return arr.map(t => ({
          id: t.id || ('t_' + Math.random().toString(16).slice(2)),
          desc: (t.desc || ''),
          reward: Number(t.reward || 0),
          maxCount: Number.isFinite(Number(t.maxCount)) ? Number(t.maxCount) : 0,
          remaining: Number.isFinite(Number(t.remaining)) ? Number(t.remaining) : Number(t.maxCount || 0),
          cycleSeconds: Number.isFinite(Number(t.cycleSeconds)) ? Number(t.cycleSeconds) : 0,
          startDate: t.startDate || todayISODate(),
          lastRefillTs: Number.isFinite(Number(t.lastRefillTs)) ? Number(t.lastRefillTs) : 0,
        }));
      } catch (e) {
        return [];
      }
    }

    function saveTasks(tasks) {
      // 先本地落盘（同步），保证 UI 立即刷新
      const sanitized = (tasks || []).map(t => {
        const o = Object.assign({}, t);
        delete o._origMaxCount;
        return o;
      });
      localStorage.setItem(TASKS_KEY, JSON.stringify(sanitized));

      // 服务器模式：仅合并更新 tasks，避免把其它字段覆盖掉
      (async () => {
        try {
          if (typeof getConfigMode !== 'function' || getConfigMode() !== 'server') return;
          if (typeof loadConfigFromServer !== 'function' || typeof saveConfigToServer !== 'function') return;
          const server = await loadConfigFromServer();
          const merged = (server && typeof server === 'object') ? server : {};
          merged.tasks = sanitized;
          await saveConfigToServer(merged);
        } catch (e) {
          console.warn('同步 tasks 到服务器失败：', e);
        }
      })();
    }

    // ========================
    // 附加任务系统（与主任务完全独立）
    // ========================
    const EXTRA_TASKS_KEY = 'extraTasks';

    const toggleExtraTasksBtn = document.getElementById('toggleExtraTasksBtn');
    const extraTasksPanel = document.getElementById('extraTasksPanel');
    const extraTasksList = document.getElementById('extraTasksList');
    const extraTasksInfo = document.getElementById('extraTasksInfo');

    function loadExtraTasks() {
      try {
        const raw = localStorage.getItem(EXTRA_TASKS_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(arr)) return [];
        return arr.map(t => ({
          id: t.id || ('et_' + Math.random().toString(16).slice(2)),
          desc: (t.desc || ''),
          reward: Number(t.reward || 0),
          maxCount: Number.isFinite(Number(t.maxCount)) ? Number(t.maxCount) : 0,
          remaining: Number.isFinite(Number(t.remaining)) ? Number(t.remaining) : Number(t.maxCount || 0),
          cycleSeconds: Number.isFinite(Number(t.cycleSeconds)) ? Number(t.cycleSeconds) : 0,
          startDate: t.startDate || todayISODate(),
          lastRefillTs: Number.isFinite(Number(t.lastRefillTs)) ? Number(t.lastRefillTs) : 0,
        }));
      } catch (e) {
        return [];
      }
    }

    function saveExtraTasks(extraTasks) {
      // 先本地落盘（同步），保证 UI 立即刷新
      const sanitized = (extraTasks || []).map(t => {
        const o = Object.assign({}, t);
        delete o._origMaxCount;
        return o;
      });
      localStorage.setItem(EXTRA_TASKS_KEY, JSON.stringify(sanitized));

      // 服务器模式：仅合并更新 extraTasks，避免把其它字段覆盖掉
      (async () => {
        try {
          if (typeof getConfigMode !== 'function' || getConfigMode() !== 'server') return;
          if (typeof loadConfigFromServer !== 'function' || typeof saveConfigToServer !== 'function') return;
          const server = await loadConfigFromServer();
          const merged = (server && typeof server === 'object') ? server : {};
          merged.extraTasks = sanitized;
          await saveConfigToServer(merged);
        } catch (e) {
          console.warn('同步 extraTasks 到服务器失败：', e);
        }
      })();
    }

    let extraTasks = loadExtraTasks();

    function refreshExtraTasksNow() {
      const now = Math.floor(Date.now() / 1000);
      extraTasks.forEach(t => {
        const cycle = Number(t.cycleSeconds || 0);
        const maxCount = Number(t.maxCount || 0);
        if (!cycle || cycle <= 0 || maxCount <= 0) {
          return;
        }
        const startTs = dateStartTs(t.startDate) || now;
        const baseline = t.lastRefillTs && t.lastRefillTs > 0 ? t.lastRefillTs : startTs;
        if (now < startTs) return;
        if (now - baseline >= cycle) {
          t.remaining = maxCount;
          const passed = Math.floor((now - baseline) / cycle);
          t.lastRefillTs = baseline + passed * cycle;
        }
      });
      saveExtraTasks(extraTasks);
    }

    function renderExtraTasksPanel() {
      if (!extraTasksList || !extraTasksInfo) return;
      extraTasks = loadExtraTasks();
      refreshExtraTasksNow();
      extraTasks = loadExtraTasks();

      extraTasksList.innerHTML = '';

      if (!extraTasks.length) {
        extraTasksList.innerHTML = '<div style="color:#888;">暂无附加任务，请在“编辑附加任务”中添加。</div>';
        extraTasksInfo.innerText = '';
        return;
      }

      extraTasks.forEach((t, idx) => {
        const row = document.createElement('div');
        row.style.marginBottom = '14px';
        row.style.borderBottom = '1px solid #eee';
        row.style.paddingBottom = '6px';

        const desc = document.createElement('div');
        desc.style.fontWeight = 'bold';
        desc.style.textAlign = 'left';
        desc.innerText = t.desc || '(未命名任务)';
        row.appendChild(desc);

        const metaRow = document.createElement('div');
        metaRow.style.display = 'flex';
        metaRow.style.justifyContent = 'flex-end';
        metaRow.style.alignItems = 'center';
        metaRow.style.gap = '10px';
        metaRow.style.marginTop = '2px';

        const meta = document.createElement('div');
        meta.style.whiteSpace = 'nowrap';
        const cycleStr = t.cycleSeconds ? formatCycle(t.cycleSeconds) : '无';
        meta.innerText = `+${Number(t.reward || 0)} 分 | ${Number(t.remaining || 0)}/${Number(t.maxCount || 0)} | 周期:${cycleStr}`;

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.innerText = '完成';
        btn.disabled = Number(t.remaining || 0) <= 0;
        btn.addEventListener('click', () => {
          extraTasks = loadExtraTasks();
          const cur = extraTasks[idx];
          if (!cur) return;
          refreshExtraTasksNow();
          extraTasks = loadExtraTasks();
          const cur2 = extraTasks[idx];
          if (!cur2) return;
          if (Number(cur2.remaining || 0) <= 0) {
            renderExtraTasksPanel();
            return;
          }
          cur2.remaining = Number(cur2.remaining || 0) - 1;
          if (cur2.remaining < 0) cur2.remaining = 0;
          saveExtraTasks(extraTasks);

          // 发放奖励
          const add = Number(cur2.reward || 0);
          if (add) {
            rewardStock += add;
            localStorage.setItem('rewardStock', rewardStock);
            updateRewardStockDisplay();

            // 服务器模式：合并更新 rewardStock，避免覆盖其它字段
            (async () => {
              try {
                if (typeof getConfigMode !== 'function' || getConfigMode() !== 'server') return;
                if (typeof loadConfigFromServer !== 'function' || typeof saveConfigToServer !== 'function') return;
                const server = await loadConfigFromServer();
                const merged = (server && typeof server === 'object') ? server : {};
                merged.rewardStock = Number(rewardStock || 0);
                await saveConfigToServer(merged);
              } catch (e) {
                console.warn('同步 rewardStock 到服务器失败：', e);
              }
            })();
          }
          renderExtraTasksPanel();
        });

        metaRow.appendChild(meta);
        metaRow.appendChild(btn);
        row.appendChild(metaRow);
        extraTasksList.appendChild(row);
      });

      extraTasksInfo.innerText = '提示：到达刷新周期后会自动补满可完成次数。';
    }

    if (toggleExtraTasksBtn && extraTasksPanel) {
      toggleExtraTasksBtn.addEventListener('click', () => {
        if (extraTasksPanel.style.display === 'none') {
          extraTasksPanel.style.display = '';
          renderExtraTasksPanel();
        } else {
          extraTasksPanel.style.display = 'none';
        }
      });
    }

    setInterval(() => {
      // 编辑弹窗打开时，避免后台刷新覆盖用户正在编辑的内存数据
      const extraTaskModalEl = document.getElementById('extraTaskModal');
      if (extraTaskModalEl && extraTaskModalEl.style.display === 'flex') return;
      extraTasks = loadExtraTasks();
      refreshExtraTasksNow();
      if (extraTasksPanel && extraTasksPanel.style.display !== 'none') {
        renderExtraTasksPanel();
      }
    }, 60 * 1000);

    function renderExtraTaskEditor() {
      const container = document.getElementById('extraTaskEditForm');
      if (!container) return;
      container.innerHTML = '';

      if (!extraTasks.length) {
        const tip = document.createElement('div');
        tip.style.color = '#888';
        tip.style.marginBottom = '10px';
        tip.innerText = '暂无任务，点击“添加任务”新增。';
        container.appendChild(tip);
      }

      extraTasks.forEach((t, idx) => {
        if (!Number.isFinite(Number(t._origMaxCount))) t._origMaxCount = Number(t.maxCount || 0);
        const row = document.createElement('div');
        row.style.display = 'flex';
        row.style.flexWrap = 'wrap';
        row.style.gap = '8px';
        row.style.alignItems = 'center';
        row.style.marginBottom = '10px';

        row.innerHTML = `

        if (!cycle || cycle <= 0 || maxCount <= 0) {
          return;
        }
        const startTs = dateStartTs(t.startDate) || now;
        const baseline = t.lastRefillTs && t.lastRefillTs > 0 ? t.lastRefillTs : startTs;
        // 如果仍未到起始日，不补
        if (now < startTs) return;
        // 经过至少一个周期 -> 补满
        if (now - baseline >= cycle) {
          t.remaining = maxCount;
          // 将 lastRefillTs 推进到最近一次周期边界，避免每次都补
          const passed = Math.floor((now - baseline) / cycle);
          t.lastRefillTs = baseline + passed * cycle;
        }

      try {

        if (prevMode === 'local' && nextMode === 'server') {

          await saveConfigToServer(getLocalConfigSnapshot());
          setConfigMode('server');
          const data = await loadConfigFromServer();
          applyConfigSnapshot(data);
        } else if (prevMode === 'server' && nextMode === 'local') {
          // 切回本地：直接应用本地快照
          setConfigMode('local');
          applyConfigSnapshot(getLocalConfigSnapshot());
        } else {
          setConfigMode(nextMode);
          const data = await loadConfig();
          applyConfigSnapshot(data);

    // 单调插值（简化版线性）
    function monotoneInterp(xs, ys) {
      return function(x) {
        let i = xs.length-2;
        for (let j=0; j<xs.length-1; j++) {
          if (x>=xs[j] && x<=xs[j+1]) { i=j; break; }
        }
        const t = (x-xs[i])/(xs[i+1]-xs[i]);
        return (1-t)*ys[i] + t*ys[i+1];
      };
    }

    // 时间概率函数：点集随 t50 缩放
    function timeProbability(t, t50=10) {
      const baseXs = [0,5,8,10,20];
      const ys = [0,10,25,50,75];
      const scale = t50/10;
      const xs = baseXs.map(x => x*scale);

      const interp = monotoneInterp(xs, ys);

      if (t <= 2*t50) {
        return interp(t);
      } else {
        const P2t50 = interp(2*t50);
        const target = 90;
        const k = -Math.log((100-target)/(100-P2t50)) / (2*t50);
        return 100 - (100-P2t50) * Math.exp(-k*(t-2*t50));
      }
    }

    function formatCountdown(sec) {
      sec = Math.max(0, Math.round(sec));
      const d = Math.floor(sec/86400); sec -= d*86400;
      const h = Math.floor(sec/3600); sec -= h*3600;

      let str = '';
      if (d) str += d+'d ';

    function startCooldown(ev, interval) {
      if (cooldownInterval) clearInterval(cooldownInterval);
      function update() {
        const now = Date.now()/1000;
        const base = (typeof ev.lastAskedTime === 'number') ? ev.lastAskedTime : 0;
        const left = Math.ceil(base + interval - now);
        if (left > 0) {
          cooldownTimer.style.display = '';
          cooldownTimer.innerText = `下次可请求：${formatCountdown(left)}`;

          // 冷却中：显示“再次询问”与费用提示
          if (reaskRow) reaskRow.style.display = '';
          if (reaskBtn) {
            const evName = select.value;
            const curEv = events.find(e => e.name === evName);
            const askCost = (curEv && typeof curEv.askCost === 'number') ? curEv.askCost : 0;
            const multiplier = (curEv && curEv.rewardMultiplier) ? curEv.rewardMultiplier : 1;
            const extraPoints = computeReaskExtraPoints(left, interval);
            const extraCost = extraPoints * multiplier;
            const totalNeed = askCost + extraCost;
            if (reaskCostInfo) {
              reaskCostInfo.innerText = `冷却中再次询问需消耗：${totalNeed}`;
            }
            if (totalNeed > 0 && rewardStock < totalNeed) {
              reaskBtn.disabled = true;
              reaskBtn.title = '奖励值不足，无法再次询问';
            } else {
              reaskBtn.disabled = false;
              reaskBtn.title = '';
            }
          }
        } else {
          cooldownTimer.style.display = 'none';
          cooldownTimer.innerText = '';
          if (reaskRow) reaskRow.style.display = 'none';
          if (reaskCostInfo) reaskCostInfo.innerText = '';
          clearInterval(cooldownInterval);
        }
      }
      update();
      cooldownInterval = setInterval(update, 1000);
    }

    function getAskCooldownInterval(ev) {
      if (!ev) return 0;
      const base = Number(ev.interval || 0);
      const last = Number(ev.lastAskedInterval || 0);
      // lastAskedInterval > 0 表示“上一次请求”后实际进入的冷却时长（用于仅本次冷却缩短）
      const v = (last > 0) ? last : base;
      return Math.max(0, v);
    }

    function computeNextAskCooldownInterval(baseIntervalSeconds, urgeKeyNum) {
      const base = Math.max(0, Number(baseIntervalSeconds || 0));
      if (!base) return 0;
      // 迫切程度 6/7/8：请求后“下一次可请求”的间隔变为设置间隔的 1/2、1/4、1/6
      // 仅对这一轮冷却生效：我们把它记录到 lastAskedInterval 上，用于下一次冷却判定/倒计时。
      if (urgeKeyNum === 6) return Math.max(1, Math.floor(base / 2));
      if (urgeKeyNum === 7) return Math.max(1, Math.floor(base / 4));
      if (urgeKeyNum === 8) return Math.max(1, Math.floor(base / 6));
      return base;
    }

    function computeReaskExtraPoints(remainingSeconds, intervalSeconds) {
      const rem = Math.max(0, Number(remainingSeconds || 0));
      const total = Math.max(0, Number(intervalSeconds || 0));
      if (rem <= 0 || total <= 0) return 0;
      // rem 越接近 total，越接近 10；线性相关；向上取整；最大 10
      const ratio = Math.min(1, rem / total);
      const pts = Math.ceil(10 * ratio);
      return Math.max(1, Math.min(10, pts));
    }

    // 检查奖励值是否足够，决定按钮可用性和消耗提示
    function updateRequestBtnState() {
      const evName = select.value;
      const ev = events.find(e => e.name === evName);
      const askCost = (ev && typeof ev.askCost === 'number') ? ev.askCost : 0;
      const askCostInfo = document.getElementById('askCostInfo');
      if (askCost > 0) {
        askCostInfo.style.display = '';
        askCostInfo.innerText = `需消耗${askCost}奖励值`;
        if (rewardStock < askCost) {
          requestBtn.disabled = true;
          requestBtn.title = '奖励值不足，无法请求许可';
        } else {
          requestBtn.disabled = false;
          requestBtn.title = '';
        }
      } else {
        askCostInfo.style.display = 'none';
        askCostInfo.innerText = '';
        requestBtn.disabled = false;
        requestBtn.title = '';
      }
    }
    select.addEventListener('change', updateRequestBtnState);
    document.getElementById('addRewardBtn').addEventListener('click', function() { setTimeout(updateRequestBtnState, 0); });
    document.getElementById('addRewardInput').addEventListener('input', function() { setTimeout(updateRequestBtnState, 0); });
    // 每次奖励值变动后都应刷新
    updateRequestBtnState();

    async function preSyncConfig() {
      if (typeof loadConfig === 'function') {
        const data = await loadConfig();
        if (typeof applyConfigSnapshot === 'function') applyConfigSnapshot(data);
      }
    }

    async function handleRequestCore(options) {
      const ignoreCooldown = !!(options && options.ignoreCooldown);

      const evName = select.value;
      const ev = events.find(e => e.name === evName);
      const urgeKey = urgeSelect.value;
      const pUrge = urgeValueMap[urgeKey] || 0;
      const urgeKeyNum = Number(urgeKey);

      // 检查事件 askCost
      const askCost = (ev && typeof ev.askCost === 'number') ? ev.askCost : 0;
      if (askCost > 0) {
        if (rewardStock < askCost) {
          alert('奖励值不足，无法请求许可！');
          updateRequestBtnState();
          return;
        } else {
          rewardStock -= askCost;
          localStorage.setItem('rewardStock', rewardStock);
          updateRewardStockDisplay();
          if (typeof saveConfig === 'function') await saveConfig();
          updateRequestBtnState();
        }
      }

      // 检查奖励值输入框
      let extra = 0;
      const rewardInput = document.getElementById('useRewardInput');
      const useVal = parseFloat(rewardInput.value) || 0;
      const multiplier = (ev && ev.rewardMultiplier) ? ev.rewardMultiplier : 1;
      const need = useVal * multiplier;
      if (useVal > 0 && rewardStock >= need) {
        rewardStock -= need;
        localStorage.setItem('rewardStock', rewardStock);
        updateRewardStockDisplay();
        if (typeof saveConfig === 'function') await saveConfig();
        extra = useVal;
        rewardInput.value = '';
        updateUseRewardInfo();
        updateRequestBtnState();
      } else if (useVal > 0) {
        alert('奖励值不足！');
        updateRequestBtnState();
        return;
      }
      // 取本次要用的附加值（奖励值），用后清空
      if (ev._pendingExtra) {
        extra = ev._pendingExtra;
        ev._pendingExtra = 0;
        rewardInput.value = '';
        updateUseRewardInfo();
        updateRequestBtnState();
      }

      const now = Date.now()/1000;
      if (typeof ev.lastGrantedTime !== 'number') ev.lastGrantedTime = 0;
      if (typeof ev.lastAskedTime !== 'number') ev.lastAskedTime = 0;
      const askPassed = now - ev.lastAskedTime;
      const currentAskCooldownInterval = getAskCooldownInterval(ev);
      if (!ignoreCooldown && askPassed < currentAskCooldownInterval) {
        // 冷却中，直接显示倒计时
        startCooldown(ev, currentAskCooldownInterval);
        document.getElementById("result").innerText = '';
        return;
      }

      // 记录本次提问时间（无论许可与否都进入提问冷却）
      ev.lastAskedTime = now;
      ev.lastAskedInterval = computeNextAskCooldownInterval(ev.interval, urgeKeyNum);
      localStorage.setItem("events", JSON.stringify(events));
      if (typeof saveConfig === 'function') await saveConfig();
      startCooldown(ev, getAskCooldownInterval(ev));

      // 用实际许可间隔 intervalPassed 作为 t 参与概率计算
      const grantPassed = now - ev.lastGrantedTime;
      const pTime = timeProbability(grantPassed, ev.t50);

      // 迫切权重动态调整（1-4为8/6/4/2倍，5为1倍，6-8为2/4/6倍）
      let wUrge = ev.wUrge;
      if (urgeKeyNum === 1) wUrge = ev.wUrge * 8;
      else if (urgeKeyNum === 2) wUrge = ev.wUrge * 6;
      else if (urgeKeyNum === 3) wUrge = ev.wUrge * 4;
      else if (urgeKeyNum === 4) wUrge = ev.wUrge * 2;
      else if (urgeKeyNum === 5) wUrge = ev.wUrge;
      else if (urgeKeyNum === 6) wUrge = ev.wUrge * 2;
      else if (urgeKeyNum === 7) wUrge = ev.wUrge * 4;
      else if (urgeKeyNum === 8) wUrge = ev.wUrge * 6;

      // 先算原始概率
      let pBase = (ev.wTime*pTime + wUrge*pUrge) / (ev.wTime+wUrge);
      // 先乘0.5得到修正后概率（百分比）
      let pFinal = pBase * 0.5;
      // 新奖励值修正逻辑
      function clamp01(x) { return Math.min(1, Math.max(0, x)); }
      function logit(p) {
        const eps = 1e-12;
        p = Math.min(1 - eps, Math.max(eps, p));
        return Math.log(p / (1 - p));
      }
      function invLogit(z) {
        if (z >= 0) {
          const ez = Math.exp(-z);
          return 1 / (1 + ez);
        } else {
          const ez = Math.exp(z);
          return ez / (1 + ez);
        }
      }
      // 参数
      const w = 0.047473;
      const alpha = 1.104326;
      // 如果有附加值，使用新公式
      if (extra > 0) {
        // 用修正后概率/100作为p0
        const p0_for_formula = clamp01(pFinal / 100);
        const R = extra;
        const sensitivity = Math.pow(1 - p0_for_formula, alpha);
        const z = logit(p0_for_formula) + w * sensitivity * R;
        pFinal = invLogit(z) * 100;
      } else {
        // 没有奖励值时，pFinal就是百分比
        // 保持原样
      }
      if (pFinal > 100) pFinal = 100;
      // 如果奖励值为负，概率减半
      let pFinalDisplay = pFinal;
      if (rewardStock < 0) {
        pFinal = pFinal / 2;
      }
      // 随机许可/禁止
      const granted = Math.random()*100 < pFinal;
      const urgeLabel = (ev.urgeLabels && ev.urgeLabels[urgeKey]) ? ev.urgeLabels[urgeKey] : '';
      document.getElementById("result").innerText =
        (granted ? '✅ 许可' : '⛔ 禁止') + `\n(概率: ${pFinalDisplay.toFixed(2)}%${rewardStock<0?'（奖励值为负，概率减半）':''}，迫切程度: ${urgeKey} - ${urgeLabel}${extra ? `，本次使用附加值: ${extra}` : ''})`;
      if (granted) {
        // 只有许可才更新“上次许可时间”（用于概率间隔）
        ensureEventHistory(ev);
        setEventLastGrantedTime(ev, now, 'granted');
      }
    }

    requestBtn.addEventListener("click", async function() {
      await preSyncConfig();
      await handleRequestCore({ ignoreCooldown: false });
    });

    if (reaskBtn) {
      reaskBtn.addEventListener('click', async function() {
        await preSyncConfig();

        const evName = select.value;
        const ev = events.find(e => e.name === evName);
        if (!ev) return;

        const now = Date.now()/1000;
        const interval = getAskCooldownInterval(ev);
        const base = (typeof ev.lastAskedTime === 'number') ? ev.lastAskedTime : 0;
        const left = Math.ceil(base + interval - now);
        if (left <= 0) {
          await handleRequestCore({ ignoreCooldown: false });
          return;
        }

        const askCost = (typeof ev.askCost === 'number') ? ev.askCost : 0;
        const multiplier = (ev && ev.rewardMultiplier) ? ev.rewardMultiplier : 1;
        const extraPoints = computeReaskExtraPoints(left, interval);
        const extraCost = extraPoints * multiplier;
        const totalNeed = askCost + extraCost;

        if (totalNeed > 0 && rewardStock < totalNeed) {
          alert('奖励值不足，无法再次询问！');
          updateRequestBtnState();
          return;
        }

        // 先扣“再次询问”的额外费用（askCost 在核心逻辑里会再扣一次，这里只扣 extraCost 部分）
        if (extraCost > 0) {
          rewardStock -= extraCost;
          localStorage.setItem('rewardStock', rewardStock);
          updateRewardStockDisplay();
          if (typeof saveConfig === 'function') await saveConfig();
          updateRequestBtnState();
        }

        // 允许绕过冷却，继续本次询问
        await handleRequestCore({ ignoreCooldown: true });
      });
    }

    // “我没忍住”：强制许可并扣除奖励值（可扣为负）
    forceGrantBtn.addEventListener('click', async function() {
      // 操作前同步服务器配置
      if (typeof loadConfig === 'function') {
        const data = await loadConfig();
        if (typeof applyConfigSnapshot === 'function') applyConfigSnapshot(data);
      }
      const evName = select.value;
      const ev = events.find(e => e.name === evName);
      const multiplier = (ev && ev.rewardMultiplier) ? ev.rewardMultiplier : 1;
      const cost = 100 * multiplier;
      rewardStock -= cost;
      localStorage.setItem('rewardStock', rewardStock);
      updateRewardStockDisplay();
      if (typeof saveConfig === 'function') await saveConfig();
      const now = Date.now()/1000;
      ensureEventHistory(ev);
      setEventLastGrantedTime(ev, now, 'force-grant');
      document.getElementById('result').innerText =
        `✅ 许可（我没忍住）\n(扣除奖励值: ${cost}，当前存量: ${rewardStock})`;
    });
  </script>
</body>
